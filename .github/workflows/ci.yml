name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Check generated OpenAPI schemas are fresh
        run: |
          go generate ./internal/schema
          gofmt -w internal/schema/openapi_generated.go
          git diff --exit-code internal/schema/openapi_generated.go

      - name: Check generated CLI skills are fresh
        run: |
          go run ./cmd/umbraco generate-skills --output-dir skills/cli
          git diff --exit-code skills/cli

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify skills bundle
        run: npm run verify:skills

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
